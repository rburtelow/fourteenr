apiVersion: v1
kind: Service
metadata:
  name: supabase-kong-tailscale
  namespace: supabase
  annotations:
    tailscale.com/expose: "true"
spec:
  type: LoadBalancer
  loadBalancerClass: tailscale
  selector:
    app.kubernetes.io/name: kong
    app.kubernetes.io/instance: supabase
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      protocol: TCP
